{% extends "base_public.html" %}

{% block title %}Register | CyberShield Africa{% endblock %}

{% block content %}

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.auth-box {
    background: #111827;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    border: 1px solid #1f2937;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.08);
}

.auth-box h2 {
    color: #00d4ff;
    text-align: center;
    margin-bottom: 20px;
}

.auth-box input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: #0b1220;
    color: white;
    border: 1px solid #1f2937;
}

.auth-box button {
    width: 100%;
    padding: 10px;
    background: #00d4ff;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

.auth-box button:hover {
    background: #00b2d6;
}

.auth-box a {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #9ca3af;
    text-decoration: none;
}
</style>

<div class="auth-container">
    <div class="auth-box">

        <h2>🛡 Create Account</h2>

        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="email" placeholder="Email" required>
            <input name="password" type="password" placeholder="Password" required>

            <button type="submit">Register</button>
        </form>

        <a href="/login">Already have an account? Login</a>

    </div>
</div>

{% endblock %}
