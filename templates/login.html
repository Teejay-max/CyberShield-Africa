<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SOC Platform{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #0b1220, #05070d);
            color: #e5e7eb;
        }

        nav {
            background: #0f172a;
            padding: 15px 25px;
            display: flex;
            gap: 15px;
            border-bottom: 1px solid #1f2937;
        }

        nav a {
            color: #e5e7eb;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: #00d4ff;
        }

        .container {
            padding: 20px;
        }
    </style>
</head>

<body>

<nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/report">New Incident</a>
    <a href="/my_reports">My Reports</a>
    <a href="/intel">Intel</a>
    <a href="/learn">Learn</a>
    <a href="/logout">Logout</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
