{% extends "base_soc.html" %}

{% block content %}

<h2 style="padding:20px;">CyberShield Intelligence Dashboard</h2>

<div class="cards">

    <div class="card">
        <h3>Total</h3>
        <p>{{ total }}</p>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <p>{{ pending }}</p>
    </div>

    <div class="card">
        <h3>Investigating</h3>
        <p>{{ investigating }}</p>
    </div>

    <div class="card">
        <h3>Resolved</h3>
        <p>{{ resolved }}</p>
    </div>

</div>

<div style="padding:20px;">
    <a class="btn" href="/admin">Go to Admin Panel</a>
</div>

{% endblock %}
